name: Backend Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths:
      - backend/**
      - .github/workflows/backend-check.yml

defaults:
  run:
    working-directory: backend

jobs:
  backend-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: latest
      - name: Check formatting
        run: uv run ruff check . --fix
      - name: Check typing
        run: uv run mypy .
      - name: Check OpenAPI schema diff
        env:
          SUPABASE_URL: dummy
          SUPABASE_KEY: dummy
          BUCKET_NAME: dummy
          MISTRAL_API_KEY: dummy
          GEMINI_API_KEY: dummy
          QDRANT_API_KEY: dummy
        run: |
          uv run python scripts/generate_openapi.py
          if ! git diff --exit-code openapi.json; then
            echo "openapi.json is out of date. Run 'python scripts/generate_openapi.py' and commit the result."
            exit 1
          fi
          echo "OpenAPI schema is up to date"