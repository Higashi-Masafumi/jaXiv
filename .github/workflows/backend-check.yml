name: Backend Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths:
      - backend/**
      - .github/workflows/backend-check.yml

defaults:
  run:
    working-directory: backend

jobs:
  backend-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: latest
      - name: Check formatting
        run: uv run ruff check . --fix
      - name: Check typing
        run: uv run mypy .
      - name: Check OpenAPI schema diff
        run: |
          PYTHONPATH=. uv run python scripts/generate_openapi.py
          if ! git diff --quiet openapi.json; then
            echo "openapi.json is out of sync with the FastAPI app. Run scripts/generate_openapi.py and commit the result."
            git diff openapi.json
            exit 1
          fi
          echo "OpenAPI schema is up to date"
