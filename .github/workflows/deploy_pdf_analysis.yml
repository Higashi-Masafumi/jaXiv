name: Deploy PDF Analysis to HF Spaces

on:
  push:
    branches:
      - main
    paths:
      - pdf_analysis/**
      - .github/workflows/deploy_pdf_analysis.yml

defaults:
  run:
    working-directory: pdf_analysis

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: latest
      - name: Deploy to Hugging Face Space
        env:
          HUGGINGFACE_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
        run: uv run python scripts/deploy_to_hf_space.py
