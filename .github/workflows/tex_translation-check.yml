name: Tex Translation Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths:
      - tex_translation/**
      - .github/workflows/tex_translation-check.yml

defaults:
  run:
    working-directory: tex_translation

jobs:
  tex-translation-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: latest
      - name: Install dependencies (including dev group)
        run: uv sync --dev
      - name: Check formatting
        run: uv run --no-sync ruff check .
      - name: Check typing
        run: uv run --no-sync mypy .
