name: jaxiv

services:
  pdf-analysis:
    container_name: pdf-analysis
    build:
      context: ./pdf_analysis
      dockerfile: Dockerfile
    restart: unless-stopped
    working_dir: /app
    ports:
      - "7860:7860"
    environment:
      LLAMA_INDEX_CACHE_DIR: /app/.cache/llama_index
      # Dockerfile の HF_HOME と同じ。モデルはイメージに含めず、初回利用時にホスト pdf_analysis/.cache/hf へキャッシュ
      HF_HOME: /app/.cache/hf
    volumes:
      - pdf-analysis-venv:/app/.venv
      - ./pdf_analysis/.cache:/app/.cache
    command: >
      sh -c "uv sync &&
             uv run uvicorn main:app --host 0.0.0.0 --port 7860 --reload"
    networks:
      - jaxiv
    develop:
      watch:
        - action: sync
          path: ./pdf_analysis
          target: /app
          ignore:
            - .venv/
            - .cache/
            - __pycache__/
            - .git/
            - .pytest_cache/
            - "*.pyc"
            - pyproject.toml
            - uv.lock
        # .venv は名前付きボリュームで永続化されるため rebuild ではなく
        # sync+restart でロックを差し替え、起動コマンドの uv sync に任せる
        - action: sync+restart
          path: ./pdf_analysis/pyproject.toml
          target: /app/pyproject.toml
        - action: sync+restart
          path: ./pdf_analysis/uv.lock
          target: /app/uv.lock

  api:
    container_name: jaxiv-api
    build:
      context: ./backend
      dockerfile: Dockerfile.render
    restart: unless-stopped
    working_dir: /app
    depends_on:
      pdf-analysis:
        condition: service_started
    ports:
      - "8001:8000"
    # Linux で host.docker.internal を解決するために host-gateway を明示
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Supabase ローカルエミュレータ（ホスト側で `supabase start` したもの）へ接続
      POSTGRES_URL: postgresql://postgres:postgres@host.docker.internal:54322/postgres
      SUPABASE_URL: http://host.docker.internal:54321
      JWKS_URL: http://host.docker.internal:54321/auth/v1/.well-known/jwks.json
      BUCKET_NAME: translated-arxiv-bucket
      BLOG_FIGURES_BUCKET_NAME: blog-figures
      LAYOUT_ANALYSIS_URL: http://pdf-analysis:7860
      OUTPUT_DIR: /app/output
      QDRANT_URL: http://qdrant:6333
      # API キー等の機密値のみ env_file(./backend/.env) からコンテナ環境変数へ注入
    volumes:
      - api-venv:/app/.venv
      - ./backend/output:/app/output
    env_file:
      - ./backend/.env
    command: >
      sh -c "uv sync &&
             uv run alembic upgrade head &&
             uv run uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    networks:
      - jaxiv
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app
          ignore:
            - .venv/
            - __pycache__/
            - .git/
            - .pytest_cache/
            - output/
            - "*.pyc"
            - pyproject.toml
            - uv.lock
        # .venv は名前付きボリュームで永続化されるため rebuild ではなく
        # sync+restart でロックを差し替え、起動コマンドの uv sync に任せる
        - action: sync+restart
          path: ./backend/pyproject.toml
          target: /app/pyproject.toml
        - action: sync+restart
          path: ./backend/uv.lock
          target: /app/uv.lock
  qdrant:
    container_name: jaxiv-qdrant
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/data
    networks:
      - jaxiv

volumes:
  api-venv:
  pdf-analysis-venv:
  qdrant-data:

networks:
  jaxiv:
    name: jaxiv_local_net
