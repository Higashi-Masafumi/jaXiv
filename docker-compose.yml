name: jaxiv

services:
  db:
    container_name: jaxiv-db
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: jaxiv
      POSTGRES_PASSWORD: jaxiv
      POSTGRES_DB: jaxiv
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jaxiv -d jaxiv"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      # ホスト側の PostgreSQL と衝突しにくいよう 5433 に割り当て（コンテナ内は 5432）
      - "5434:5432"
    networks:
      - jaxiv

  pdf-analysis:
    container_name: pdf-analysis
    build:
      context: ./pdf_analysis
      dockerfile: Dockerfile
    restart: unless-stopped
    working_dir: /app
    ports:
      - "7860:7860"
    environment:
      LLAMA_INDEX_CACHE_DIR: /app/.cache/llama_index
      # Dockerfile の HF_HOME と同じ。モデルはイメージに含めず、初回利用時にホスト pdf_analysis/.cache/hf へキャッシュ
      HF_HOME: /app/.cache/hf
    volumes:
      - pdf-analysis-venv:/app/.venv
      - ./pdf_analysis/.cache:/app/.cache
    command: >
      sh -c "uv sync &&
             uv run uvicorn main:app --host 0.0.0.0 --port 7860 --reload"
    networks:
      - jaxiv
    develop:
      watch:
        - action: sync
          path: ./pdf_analysis
          target: /app
          ignore:
            - .venv/
            - .cache/
            - __pycache__/
            - .git/
            - .pytest_cache/
            - "*.pyc"
        - action: rebuild
          path: ./pdf_analysis/pyproject.toml
        - action: rebuild
          path: ./pdf_analysis/uv.lock

  api:
    container_name: jaxiv-api
    build:
      context: ./backend
      dockerfile: Dockerfile.render
    restart: unless-stopped
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
      pdf-analysis:
        condition: service_started
    ports:
      - "8001:8000"
    environment:
      # ローカル用に固定（ホストからは localhost:5433 / DBeaver 等）
      POSTGRES_URL: postgresql://jaxiv:jaxiv@db:5432/jaxiv
      LAYOUT_ANALYSIS_URL: http://pdf-analysis:7860
      OUTPUT_DIR: /app/output
      QDRANT_URL: http://qdrant:6333
      # 機密値は env_file(./backend/.env) からコンテナ環境変数へ注入
    volumes:
      - api-venv:/app/.venv
      - ./backend/output:/app/output
    env_file:
      - ./backend/.env
    command: >
      sh -c "uv sync &&
             uv run alembic upgrade head &&
             uv run uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    networks:
      - jaxiv
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app
          ignore:
            - .venv/
            - __pycache__/
            - .git/
            - .pytest_cache/
            - output/
            - "*.pyc"
        - action: rebuild
          path: ./backend/pyproject.toml
        - action: rebuild
          path: ./backend/uv.lock
  qdrant:
    container_name: jaxiv-qdrant
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/data
    networks:
      - jaxiv

volumes:
  pg-data:
  api-venv:
  pdf-analysis-venv:
  qdrant-data:

networks:
  jaxiv:
    name: jaxiv_local_net
