<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1270 760">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#082f49"/>
      <stop offset="1" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#0369a1"/>
    </linearGradient>
  </defs>

  <rect width="1270" height="760" fill="url(#bg)"/>

  <g stroke="#1e3a5f" stroke-width="1" opacity="0.3">
    <path d="M0 95 H1270 M0 190 H1270 M0 285 H1270 M0 380 H1270 M0 475 H1270 M0 570 H1270 M0 665 H1270"/>
    <path d="M127 0 V760 M254 0 V760 M381 0 V760 M508 0 V760 M635 0 V760 M762 0 V760 M889 0 V760 M1016 0 V760 M1143 0 V760"/>
  </g>

  <g transform="translate(110,180)">
    <rect width="200" height="200" rx="44" fill="url(#mark)"/>
    <circle cx="100" cy="50" r="20" fill="#dc2626"/>
    <path d="M84 78 h32 v82 a29 29 0 0 1 -29 29 h-16 a7 7 0 0 1 -7 -7 v-17 a7 7 0 0 1 7 -7 h11 a2 2 0 0 0 2 -2 Z" fill="#ffffff"/>
  </g>

  <g font-family="Inter, system-ui, sans-serif" fill="#ffffff">
    <text x="350" y="240" font-size="84" font-weight="800" letter-spacing="-2" fill="#7dd3fc">jaXiv</text>
    <text x="350" y="340" font-size="64" font-weight="800" letter-spacing="-2">arXiv論文を、</text>
    <text x="350" y="420" font-size="64" font-weight="800" letter-spacing="-2">日本語で読む。</text>
  </g>

  <g font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="500" fill="#bae6fd">
