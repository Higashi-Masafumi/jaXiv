    <text x="110" y="580">PDFを再コンパイルして、図・式・参考文献も崩れない。</text>
  </g>

  <g transform="translate(110,640)" font-family="Inter, system-ui, sans-serif">
    <rect width="280" height="64" rx="32" fill="#0ea5e9"/>
