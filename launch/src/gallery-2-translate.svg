<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1270 760">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0f9ff"/>
      <stop offset="1" stop-color="#e0f2fe"/>
    </linearGradient>
    <filter id="sh" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1270" height="760" fill="url(#bg)"/>

  <g font-family="Inter, system-ui, sans-serif">
    <text x="635" y="90" text-anchor="middle" font-size="48" font-weight="800" fill="#0c4a6e" letter-spacing="-1">
      レイアウトを保ったまま、英→日に。
    </text>
    <text x="635" y="135" text-anchor="middle" font-size="22" font-weight="500" fill="#0369a1">
      LaTeXを再コンパイルするから、図・式・参考文献も崩れません。
    </text>
  </g>

  <!-- EN paper card -->
  <g filter="url(#sh)" transform="translate(80,180)">
    <rect width="500" height="520" rx="20" fill="#ffffff"/>
    <rect x="20" y="20" width="100" height="22" rx="11" fill="#fee2e2"/>
    <text x="70" y="37" text-anchor="middle" font-family="Inter, system-ui, sans-serif"
          font-size="14" font-weight="700" fill="#b91c1c">ENGLISH</text>
    <text x="20" y="80" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#0f172a">
      Attention Is All You Need
    </text>
    <text x="20" y="108" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#64748b">
      Ashish Vaswani, Noam Shazeer, Niki Parmar, et al.
    </text>
    <g font-family="Inter, system-ui, sans-serif" font-size="14" fill="#334155">
      <text x="20" y="150" font-weight="700">Abstract</text>
      <text x="20" y="178">The dominant sequence transduction models are based on</text>
      <text x="20" y="200">complex recurrent or convolutional neural networks that</text>
      <text x="20" y="222">include an encoder and a decoder. We propose a new simple</text>
      <text x="20" y="244">network architecture, the Transformer, based solely on</text>
      <text x="20" y="266">attention mechanisms, dispensing with recurrence and</text>
      <text x="20" y="288">convolutions entirely.</text>
    </g>
    <!-- formula box -->
    <rect x="20" y="320" width="460" height="80" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="250" y="370" text-anchor="middle" font-family="Georgia, serif"
          font-size="22" font-style="italic" fill="#0f172a">
      Attention(Q,K,V) = softmax(QKᵀ/√dₖ) V
    </text>
    <!-- figure -->
    <rect x="20" y="420" width="460" height="80" rx="8" fill="#eff6ff" stroke="#dbeafe"/>
    <g stroke="#1d4ed8" stroke-width="2" fill="none">
      <path d="M40 480 L80 450 L120 470 L160 440 L200 460 L240 435 L280 455 L320 425 L360 445 L400 415 L440 440 L460 425"/>
    </g>
  </g>

  <!-- Arrow -->
  <g transform="translate(610,420)">
    <circle cx="25" cy="25" r="34" fill="#0ea5e9"/>
    <path d="M10 25 L40 25 M30 15 L42 25 L30 35" stroke="#ffffff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- JP paper card -->
  <g filter="url(#sh)" transform="translate(690,180)">
    <rect width="500" height="520" rx="20" fill="#ffffff"/>
    <rect x="20" y="20" width="100" height="22" rx="11" fill="#dcfce7"/>
    <text x="70" y="37" text-anchor="middle" font-family="Inter, system-ui, sans-serif"
          font-size="14" font-weight="700" fill="#15803d">日本語</text>
    <text x="20" y="80" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#0f172a">
      Attentionこそが全て
    </text>
    <text x="20" y="108" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#64748b">
      Ashish Vaswani, Noam Shazeer, Niki Parmar, ほか
    </text>
    <g font-family="Inter, system-ui, sans-serif" font-size="14" fill="#334155">
      <text x="20" y="150" font-weight="700">概要</text>
      <text x="20" y="178">主流の系列変換モデルは、エンコーダとデコーダを含む</text>
      <text x="20" y="200">複雑な再帰型または畳み込み型ニューラルネットワークに</text>
      <text x="20" y="222">基づいている。本研究では、Attention機構のみに基づく</text>
      <text x="20" y="244">新たな単純なネットワーク構造「Transformer」を提案し、</text>
      <text x="20" y="266">再帰と畳み込みを完全に排除する。</text>
    </g>
    <rect x="20" y="320" width="460" height="80" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="250" y="370" text-anchor="middle" font-family="Georgia, serif"
          font-size="22" font-style="italic" fill="#0f172a">
      Attention(Q,K,V) = softmax(QKᵀ/√dₖ) V
    </text>
    <rect x="20" y="420" width="460" height="80" rx="8" fill="#eff6ff" stroke="#dbeafe"/>
    <g stroke="#1d4ed8" stroke-width="2" fill="none">
      <path d="M40 480 L80 450 L120 470 L160 440 L200 460 L240 435 L280 455 L320 425 L360 445 L400 415 L440 440 L460 425"/>
    </g>
  </g>
</svg>
