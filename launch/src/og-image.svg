<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#082f49"/>
      <stop offset="0.55" stop-color="#0c4a6e"/>
      <stop offset="1" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#0369a1"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#1e3a5f" stroke-width="1" opacity="0.35">
    <path d="M0 90 H1200 M0 180 H1200 M0 270 H1200 M0 360 H1200 M0 450 H1200 M0 540 H1200"/>
    <path d="M100 0 V630 M250 0 V630 M400 0 V630 M550 0 V630 M700 0 V630 M850 0 V630 M1000 0 V630 M1150 0 V630"/>
  </g>

  <!-- left: mark -->
  <g transform="translate(80,120)">
    <rect width="220" height="220" rx="48" fill="url(#mark)"/>
    <circle cx="110" cy="56" r="22" fill="#dc2626"/>
    <path d="M92 88 h36 v92 a32 32 0 0 1 -32 32 h-18 a8 8 0 0 1 -8 -8 v-20 a8 8 0 0 1 8 -8 h12 a2 2 0 0 0 2 -2 Z" fill="#ffffff"/>
  </g>

  <!-- right: text -->
  <g font-family="Inter, system-ui, sans-serif" fill="#ffffff">
    <text x="350" y="220" font-size="124" font-weight="800" letter-spacing="-4">
      ja<tspan fill="#7dd3fc">X</tspan>iv
    </text>
    <text x="350" y="320" font-size="46" font-weight="700" fill="#e0f2fe">arXivの論文を、まるごと日本語に。</text>
    <text x="350" y="378" font-size="28" font-weight="500" fill="#bae6fd">レイアウトを保ったまま、PDFを再コンパイル。</text>
  </g>

  <!-- bottom chips -->
  <g font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="22" fill="#082f49">
    <g transform="translate(350,440)">
      <rect width="180" height="56" rx="28" fill="#7dd3fc"/>
      <text x="90" y="36" text-anchor="middle">arXiv URL貼付</text>
    </g>
    <g transform="translate(548,440)">
      <rect width="200" height="56" rx="28" fill="#bae6fd"/>
      <text x="100" y="36" text-anchor="middle">LaTeX再コンパイル</text>
    </g>
    <g transform="translate(766,440)">
      <rect width="200" height="56" rx="28" fill="#e0f2fe"/>
      <text x="100" y="36" text-anchor="middle">論文チャット</text>
    </g>
  </g>

  <!-- footer -->
  <text x="600" y="580" text-anchor="middle" font-family="Inter, system-ui, sans-serif"
        font-size="22" font-weight="500" fill="#7dd3fc" letter-spacing="2">
    READ ENGLISH PAPERS IN JAPANESE
  </text>
</svg>
