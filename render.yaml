services:
  - name: jaxiv-tex-translation
    type: web
    plan: free
    runtime: docker
    repo: https://github.com/Higashi-Masafumi/jaXiv
    dockerfilePath: Dockerfile
    rootDir: ./tex_translation
    envVars:
      # MISTRAL_API_KEY は Render ダッシュボードでシークレットとして設定する
      - key: MISTRAL_API_KEY
        sync: false

  - name: arxiv-translation-service
    type: web
    plan: free
    runtime: docker
    repo: https://github.com/Higashi-Masafumi/jaXiv
    dockerfilePath: Dockerfile.render
    rootDir: ./backend
    envVars:
      - key: LAYOUT_ANALYSIS_URL
        value: https://masamasa4-jaxiv-pdf-analysis.hf.space
      - key: TEX_TRANSLATION_URL
        # Render private service: 同アカウント内から http://<service-name>:<port> で解決できる
        value: https://jaxiv-tex-translation.onrender.com
      - key: FRONTEND_BASE_URL
        value: https://jaxiv-frontend.cruiseeast.workers.dev/
